name: Sharded Automation Run

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sharded-automation.yml
      - tests/naukri-apply.spec.ts
      - src/**
      - config.json
  workflow_dispatch:
    inputs:
      totalLoops:
        description: "Total loops across all shards"
        required: false
        default: "20"

jobs:
  run-shard:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Restore session file from secret
        shell: pwsh
        env:
          NAUKRI_SESSION_JSON: ${{ secrets.NAUKRI_SESSION_JSON }}
        run: |
          if ($env:NAUKRI_SESSION_JSON -and $env:NAUKRI_SESSION_JSON.Trim().Length -gt 0) {
            Set-Content -Path naukri-session.json -Value $env:NAUKRI_SESSION_JSON -NoNewline
          } else {
            Write-Host "NAUKRI_SESSION_JSON secret not set; continuing without restored session file."
          }

      - name: Run shard ${{ matrix.shardIndex }}/3
        shell: pwsh
        env:
          SHARD_INDEX: ${{ matrix.shardIndex }}
          SHARD_TOTAL: 3
          TOTAL_LOOPS: ${{ github.event.inputs.totalLoops }}
          HEADLESS: "true"
          BROWSER_CHANNEL: "msedge"
        run: npx tsx tests/naukri-apply.spec.ts

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shardIndex }}-logs
          path: |
            logs/**
            debug-*.png
